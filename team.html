<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Details | PEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;500;700&family=Teko:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2">
</head>

<body>
    <!-- Main Navigation -->
    <header class="main-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">PEC<span class="logo-accent">.</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="schedule.html">Schedule</a></li>
                    <li><a href="standings.html">Standings</a></li>
                    <li><a href="teams.html" class="active">Teams</a></li>
                    <li><a href="watch.html">Watch</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <a href="admin.html" class="btn btn-primary" style="text-decoration:none;">Admin</a>
            </div>
        </div>
        <!-- Game Filter Nav -->
        <nav class="game-nav">
            <div class="container game-nav-inner">
                <button class="game-filter active" data-game="Rocket League">Rocket League</button>
                <button class="game-filter" data-game="Overwatch 2">Overwatch 2</button>
                <button class="game-filter" data-game="Smash Bros">Smash Bros</button>
                <button class="game-filter" data-game="Valorant">Valorant</button>
            </div>
        </nav>
    </header>

    <main>
        <div class="team-header-container">
            <section class="team-hero" style="position: relative; overflow: hidden;">
                <div id="team-hero-bg" style="position: absolute; top: 0; right: 0; width: 60%; height: 100%; background-size: cover; background-position: center right; z-index: 1; -webkit-mask-image: linear-gradient(to right, transparent 0%, black 80%); mask-image: linear-gradient(to right, transparent 0%, black 100%); opacity: 0.5;"></div>
                <div class="container team-hero-inner" style="position: relative; z-index: 2;">
                    <div class="team-hero-logo" id="team-hero-logo"
                        style="background:transparent; width:200px; height:200px;">?</div>
                    <div class="team-hero-info">
                        <h1 id="team-hero-name">Team Name</h1>
                        <p class="team-hero-desc">Member of the Power Esports Conference since 2024.</p>
                    </div>
                </div>
            </section>
        </div>

        <section class="container team-unified-grid" style="padding: 2rem 1rem;">
            <!-- Left: Schedule View -->
            <div id="view-overview" class="team-view active">
                <div class="section-header" style="margin-bottom: 1rem;">
                    <h2 style="font-size: 1.25rem;">Upcoming Matches</h2>
                </div>
                <div class="table-responsive">
                    <table class="team-schedule-table" style="font-size: 0.85rem;">
                        <tbody id="team-schedule-body">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Center: Stats View -->
            <div id="view-stats" class="team-view active">
                <div class="stats-container" id="team-stats-view-content">
                    <!-- Injected Via JS -->
                </div>
            </div>

            <!-- Right: Roster View -->
            <div id="view-roster" class="team-view active">
                <div class="section-header" style="margin-bottom: 1rem;">
                    <h2 style="font-size: 1.25rem;">Roster</h2>
                </div>
                <div class="vertical-roster-list" id="team-roster-grid" style="display:flex; flex-direction:column; gap:1rem;">
                    <!-- Injected Via JS -->
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <h2>PEC</h2>
                <p>&copy; 2026 Power Esports Conference</p>
            </div>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
            </div>
        </div>
    </footer>

    <script src="script.js?v=29"></script>
</body>
</body>

</html>
