<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule | PEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;500;700&family=Teko:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Main Navigation -->
    <header class="main-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">PEC<span class="logo-accent">.</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="schedule.html" class="active">Schedule</a></li>
                    <li><a href="standings.html">Standings</a></li>
                    <li><a href="teams.html">Teams</a></li>
                    <li><a href="watch.html">Watch</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="btn btn-outline" style="margin-right:0.5rem">Log In</button>
                <a href="admin.html" class="btn btn-primary" style="text-decoration:none;">Admin</a>
            </div>
        </div>
    </header>

    <main>
        <section class="schedule-section container">
            <div class="section-header">
                <h2>Full Schedule</h2>
                <div class="filters">
                    <select id="week-filter">
                        <option value="1">Week 1 (Jan 19)</option>
                        <option value="2">Week 2 (Jan 26)</option>
                        <option value="3">Week 3 (Feb 2)</option>
                        <option value="4">Week 4 (Feb 9)</option>
                        <option value="5">Week 5 (Feb 16)</option>
                        <option value="6">Week 6 (Feb 23)</option>
                        <option value="7">Week 7 (Mar 2)</option>
                        <option value="8">Week 8 (Mar 9)</option>
                        <option value="9">Week 9 (Mar 16)</option>
                    </select>

                    <select id="team-filter">
                        <option value="all">All Teams</option>
                        <option value="Baylor">Baylor</option>
                        <option value="Boise State">Boise State</option>
                        <option value="Kansas">Kansas</option>
                        <option value="Michigan State">Michigan State</option>
                        <option value="Minnesota">Minnesota</option>
                        <option value="Nebraska">Nebraska</option>
                        <option value="Ohio State">Ohio State</option>
                        <option value="Syracuse">Syracuse</option>
                        <option value="Utah">Utah</option>
                    </select>
                </div>
            </div>

            <div class="schedule-grid" id="full-schedule-grid">
                <!-- Injected via JS -->
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <h2>PEC</h2>
                <p>&copy; 2026 Power Esports Conference</p>
            </div>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
            </div>
        </div>
    </footer>

    <script src="script.js?v=4"></script>
</body>

</html>
