<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule | PEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;500;700&family=Teko:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=13">
</head>

<body>
    <!-- Main Navigation -->
    <header class="main-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">PEC<span class="logo-accent">.</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="schedule.html" class="active">Schedule</a></li>
                    <li><a href="standings.html">Standings</a></li>
                    <li><a href="teams.html">Teams</a></li>
                    <li><a href="watch.html">Watch</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="btn btn-outline" style="margin-right:0.5rem">Log In</button>
                <a href="admin.html" class="btn btn-primary" style="text-decoration:none;">Admin</a>
            </div>
        </div>

        <!-- Game Filter Nav -->
        <nav class="game-nav">
            <div class="container game-nav-inner">
                <button class="game-filter active" data-game="all">All Games</button>
                <button class="game-filter" data-game="Rocket League">Rocket League</button>
                <button class="game-filter" data-game="Overwatch 2">Overwatch 2</button>
                <button class="game-filter" data-game="Smash Bros">Smash Bros</button>
                <button class="game-filter" data-game="Valorant">Valorant</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="schedule-section container">
            <div class="schedule-controls">
                <h1 class="page-title">Season Schedule</h1>

                <!-- Week Selector (Horizontal Scroll) -->
                <div class="week-selector-container">
                    <button class="scroll-btn left" onclick="scrollWeeks(-1)">&#8249;</button>
                    <div class="week-selector" id="week-selector">
                        <!-- Injected via JS -->
                        <div class="week-item active" data-week="1">
                            <span class="week-label">WEEK 1</span>
                            <span class="week-date">JAN 19</span>
                        </div>
                        <div class="week-item" data-week="2">
                            <span class="week-label">WEEK 2</span>
                            <span class="week-date">JAN 26</span>
                        </div>
                        <!-- ... will be dynamic ... -->
                    </div>
                    <button class="scroll-btn right" onclick="scrollWeeks(1)">&#8250;</button>
                </div>

                <div class="filters-bar">
                    <select id="team-filter" class="modern-select">
                        <option value="all">All Teams</option>
                        <option value="Baylor">Baylor</option>
                        <option value="Boise State">Boise State</option>
                        <option value="Kansas">Kansas</option>
                        <option value="Michigan State">Michigan State</option>
                        <option value="Minnesota">Minnesota</option>
                        <option value="Nebraska">Nebraska</option>
                        <option value="Ohio State">Ohio State</option>
                        <option value="Syracuse">Syracuse</option>
                        <option value="Utah">Utah</option>
                    </select>
                </div>
            </div>

            <div class="schedule-list-header">
                <div class="col-matchup">MATCHUP</div>
                <div class="col-time">TIME</div>
                <div class="col-tv">WATCH</div>
                <div class="col-result">RESULT</div>
            </div>

            <div class="schedule-list" id="full-schedule-list">
                <!-- Injected via JS -->
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <h2>PEC</h2>
                <p>&copy; 2026 Power Esports Conference</p>
            </div>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
            </div>
        </div>
    </footer>

    <script src="script.js?v=13"></script>
    </script>
</body>

</html>
