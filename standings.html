<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standings | PEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;500;700&family=Teko:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Main Navigation -->
    <header class="main-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">PEC<span class="logo-accent">.</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="schedule.html">Schedule</a></li>
                    <li><a href="standings.html" class="active">Standings</a></li>
                    <li><a href="teams.html">Teams</a></li>
                    <li><a href="watch.html">Watch</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="btn btn-outline" style="margin-right:0.5rem">Log In</button>
                <a href="admin.html" class="btn btn-primary" style="text-decoration:none;">Admin</a>
            </div>
        </div>
    </header>

    <!-- Game Filter Nav (Reused) -->
    <nav class="game-nav">
        <div class="container game-nav-inner">
            <button class="game-filter active" data-game="Rocket League">Rocket League</button>
            <button class="game-filter" data-game="Overwatch 2">Overwatch 2</button>
            <button class="game-filter" data-game="Smash Bros">Smash Bros</button>
            <button class="game-filter" data-game="Valorant">Valorant</button>
        </div>
    </nav>

    <main>
        <section class="container standings-section">
            <h1 class="page-title">Conference Standings</h1>

            <div class="table-container">
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th class="rank-col">Rank</th>
                            <th class="team-col">Team</th>
                            <th>W</th>
                            <th>L</th>
                            <th>Win %</th>
                            <th>Strk</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body">
                        <!-- Injected via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <h2>PEC</h2>
                <p>&copy; 2026 Power Esports Conference</p>
            </div>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
            </div>
        </div>
    </footer>

    <script src="script.js?v=4"></script>
</body>

</html>
