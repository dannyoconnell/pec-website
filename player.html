<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profile | PEC</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;500;700&family=Teko:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .player-hero {
            position: relative;
            background: var(--bg-dark);
            height: 220px;
            /* Much shorter */
            margin-top: -1px;
            overflow: visible;
            /* Allow avatar overlap */
            display: flex;
            align-items: center;
            border-bottom: 1px solid #334155;
            margin-bottom: 4rem;
            /* Space for overlapped avatar */
        }

        .player-hero-bg {
            position: absolute;
            top: 0;
            right: 0;
            width: 60%;
            height: 100%;
            background-size: cover;
            background-position: center right;
            /* Force right alignment */
            z-index: 1;
            /* Sharp fade */
            mask-image: linear-gradient(to right, transparent 0%, black 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 80%);
            opacity: 0.8;
        }

        .hero-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 120%;
            /* Larger relative to short banner */
            opacity: 0.05;
            z-index: 2;
            pointer-events: none;
        }

        .container.player-hero-content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            height: 100%;
            gap: 2rem;
            padding-left: 0;
        }

        .player-avatar-large {
            width: 200px;
            height: 200px;
            background: #1e293b;
            border-radius: 50%;
            border: 4px solid var(--accent-red);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
            top: 40px;
            /* Overlap bottom */
        }

        .player-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-top: 1rem;
        }

        .player-name {
            font-family: 'Teko', sans-serif;
            font-size: 5rem;
            line-height: 0.9;
            text-transform: uppercase;
            font-weight: 700;
            color: white;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            margin-bottom: 0;
        }

        .player-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.2rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
        }

        .meta-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-family: 'Teko', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            line-height: 1;
            margin-bottom: 0.2rem;
            color: white;
        }

        .stat-label {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .player-hero {
                height: auto;
                padding: 4rem 0;
            }

            .player-hero-content {
                flex-direction: column;
                text-align: center;
            }

            .player-avatar-large {
                width: 180px;
                height: 180px;
            }

            .player-name {
                font-size: 4rem;
            }

            .player-meta {
                justify-content: center;
                font-size: 1.1rem;
            }

            .player-hero-bg {
                width: 100%;
                opacity: 0.3;
                mask-image: none;
                -webkit-mask-image: none;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>

<body class="player-profile-page">
    <!-- Main Navigation -->
    <header class="main-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">PEC<span class="logo-accent">.</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="schedule.html">Schedule</a></li>
                    <li><a href="standings.html">Standings</a></li>
                    <li><a href="teams.html" class="active">Teams</a></li>
                    <li><a href="watch.html">Watch</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <a href="admin.html" class="btn btn-primary" style="text-decoration:none;">Admin</a>
            </div>
        </div>
    </header>

    <div id="player-not-found" style="display:none; padding: 10rem 0; text-align:center;">
        <h1>Player Not Found</h1>
        <p style="color:var(--text-muted); margin-bottom:2rem;">The requested player profile could not be loaded.</p>
        <a href="teams.html" class="btn btn-primary">Back to Teams</a>
    </div>

    <!-- Hidden by default, shown by JS -->
    <div id="player-content" style="display:none;">
        <header class="player-hero">
            <div id="hero-bg" class="player-hero-bg"></div>
            <img id="hero-watermark" class="hero-watermark" src="" alt="Watermark">

            <div class="container player-hero-content">
                <div class="player-avatar-large">
                    <img id="player-img" src="" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div class="player-info">
                    <div style="font-family:'Chakra Petch'; color:var(--accent-red); font-weight:700; font-size:1.2rem; letter-spacing:2px; margin-bottom:0.5rem; text-transform:uppercase;"
                        id="player-role-label">ROLE</div>
                    <h1 class="player-name" id="player-name">PLAYER NAME</h1>
                    <div class="player-meta">
                        <div class="meta-pill">
                            <img id="meta-team-logo" src="" style="width:30px; height:30px; object-fit:contain;">
                            <span id="player-team" style="color:white; font-weight:700;">Team</span>
                        </div>
                        <span>•</span>
                        <span id="player-game-display">Game</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="container" style="padding: 3rem 1rem;">
            <div class="player-content-grid"
                style="display:grid; grid-template-columns: 1fr 1fr; gap:2rem; align-items:start;">
                <!-- Stats Column -->
                <div class="stats-section">
                    <h2 class="section-title">Career Statistics</h2>
                    <div class="grid career-stats-grid"
                        style="grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom:0;">
                        <!-- JS Injected -->
                    </div>
                </div>

                <!-- History Column -->
                <div class="recent-matches">
                    <h2 class="section-title">Match History</h2>
                    <div class="editor-card" style="padding:0;">
                        <div class="history-header"
                            style="display:grid; grid-template-columns: 1fr 100px 120px; padding:1rem; background:#1e293b; color:var(--text-muted); font-size:0.9rem; font-weight:bold; text-transform:uppercase;">
                            <span>Opponent</span>
                            <span style="text-align:center">Result</span>
                            <span style="text-align:right">Date</span>
                        </div>
                        <div id="player-match-history">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>

            <style>
                @media (max-width: 768px) {
                    .player-content-grid {
                        grid-template-columns: 1fr !important;
                    }
                }
            </style>
        </div>
    </div>

    <script src="script.js?v=11"></script>
</body>

</html>
