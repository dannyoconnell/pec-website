<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profile | PEC</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;500;700&family=Teko:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .player-hero {
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.9), var(--bg-dark)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            padding: 6rem 0 4rem;
            color: white;
            border-bottom: 1px solid #334155;
            position: relative;
        }

        .player-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            z-index: 0;
        }

        .player-hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            gap: 2rem;
        }

        .player-avatar-large {
            width: 150px;
            height: 150px;
            background: var(--bg-card);
            border: 2px solid var(--accent-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--text-muted);
            overflow: hidden;
        }

        .player-info h1 {
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 0.5rem;
            font-family: 'Teko', sans-serif;
            text-transform: uppercase;
        }

        .player-meta {
            display: flex;
            gap: 1.5rem;
            font-family: 'Chakra Petch', sans-serif;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            font-family: 'Teko', sans-serif;
        }

        .stat-label {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .recent-matches {
            margin-top: 3rem;
        }

        .match-history-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            padding: 1rem;
            border-bottom: 1px solid #334155;
            align-items: center;
            color: white;
            text-decoration: none;
            transition: background 0.2s;
        }

        .match-history-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="player-profile-page"> <!-- Added class hook for JS -->
    <!-- Main Navigation -->
    <header class="main-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">PEC<span class="logo-accent">.</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="schedule.html">Schedule</a></li>
                    <li><a href="standings.html">Standings</a></li>
                    <li><a href="teams.html" class="active">Teams</a></li>
                    <li><a href="watch.html">Watch</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <a href="admin.html" class="btn btn-primary" style="text-decoration:none;">Admin</a>
            </div>
        </div>
    </header>

    <div id="player-not-found" style="display:none; padding: 4rem; text-align:center; color:white;">
        <h1>Player Not Found</h1>
        <p>The requested player does not exist.</p>
        <a href="teams.html" class="btn btn-primary">Back to Teams</a>
    </div>

    <div id="player-content">
        <header class="player-hero">
            <div class="container player-hero-content">
                <div class="player-avatar-large">
                    <img id="player-img" src="https://ui-avatars.com/api/?name=P&background=0D8ABC&color=fff"
                        style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div class="player-info">
                    <h1 id="player-name">Player Name</h1>
                    <div class="player-meta">
                        <span id="player-team">Team Name</span> • <span id="player-role">Role</span> • <span
                            id="player-game">Game</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="container" style="padding: 3rem 1rem;">
            <h2 class="section-title">Career Statistics</h2>
            <div class="grid" style="grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom:3rem;">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total-kills">-</div>
                    <div class="stat-label">Total Kills</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-kd-ratio">-</div>
                    <div class="stat-label">K/D Ratio</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-total-assists">-</div>
                    <div class="stat-label">Total Assists</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-games-played">-</div>
                    <div class="stat-label">Games Played</div>
                </div>
            </div>

            <div class="recent-matches">
                <h2 class="section-title">Match History</h2>
                <div class="editor-card" style="padding:0;">
                    <div
                        style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; padding:1rem; background:#1e293b; color:var(--text-muted); font-size:0.9rem; font-weight:bold; text-transform:uppercase;">
                        <span>Opponent</span>
                        <span>Result</span>
                        <span>K / D / A</span>
                        <span>Date</span>
                    </div>
                    <div id="player-match-history">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=8"></script>
</body>

</html>
