<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details | PEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;500;700&family=Teko:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="main-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">PEC<span class="logo-accent">.</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="schedule.html">Schedule</a></li>
                    <li><a href="standings.html">Standings</a></li>
                    <li><a href="teams.html">Teams</a></li>
                    <li><a href="watch.html">Watch</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="btn btn-outline" style="margin-right:0.5rem">Log In</button>
                <a href="admin.html" class="btn btn-primary" style="text-decoration:none;">Admin</a>
            </div>
        </div>
    </header>

    <main class="match-details-page">
        <!-- Scoreboard Header -->
        <section class="match-scoreboard-section">
            <div class="container">
                <div class="match-header-meta">
                    <span id="match-game-type">Game Type</span> • <span id="match-date">Date</span> • <span
                        id="match-status" class="live-indicator">FINAL</span>
                </div>
                <div class="scoreboard-flex">
                    <div class="score-team">
                        <div class="score-logo" id="detail-teamA-logo"></div>
                        <h1 id="detail-teamA-name">Team A</h1>
                    </div>
                    <div class="score-center">
                        <div class="big-score">
                            <span id="score-A">3</span> - <span id="score-B">1</span>
                        </div>
                    </div>
                    <div class="score-team">
                        <div class="score-logo" id="detail-teamB-logo"></div>
                        <h1 id="detail-teamB-name">Team B</h1>
                    </div>
                </div>
            </div>
        </section>

        <!-- Stats Mockup -->
        <section class="container stats-container">
            <!-- Team Comparison -->
            <div class="stats-card">
                <h2 class="card-title">Team Comparison</h2>
                <div class="stat-row">
                    <span>58%</span>
                    <div class="stat-bar-container">
                        <div class="stat-label">Possession</div>
                        <div class="stat-track">
                            <div class="stat-fill" style="width: 58%; left: 0;"></div>
                        </div>
                    </div>
                    <span>42%</span>
                </div>
                <!-- More dynamically added via JS -->
                <div id="team-stats-content"></div>
            </div>

            <!-- Player Stats -->
            <div class="stats-card">
                <h2 class="card-title">Player Statistics</h2>
                <div class="player-table-responsive">
                    <table class="player-stats-table" id="player-stats-table">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>Kills</th>
                                <th>Deaths</th>
                                <th>Assists</th>
                                <th>Rating</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Injected JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <h2>PEC</h2>
                <p>&copy; 2026 Power Esports Conference</p>
            </div>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
