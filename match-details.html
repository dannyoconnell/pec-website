<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details | PEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;500;700&family=Teko:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="main-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">PEC<span class="logo-accent">.</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="schedule.html">Schedule</a></li>
                    <li><a href="standings.html">Standings</a></li>
                    <li><a href="teams.html">Teams</a></li>
                    <li><a href="watch.html">Watch</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <a href="admin.html" class="btn btn-primary" style="text-decoration:none;">Admin</a>
            </div>
        </div>
    </header>

    <main class="match-details-page">
        <!-- Scoreboard Header -->
        <section class="match-scoreboard-section">
            <div class="container">
                <div class="match-header-meta">
                    <span id="match-game-type">Game Type</span> • <span id="match-date">Date</span><span
                        id="match-status" class="live-indicator" style="display:none">FINAL</span>
                </div>
                <div class="scoreboard-flex">
                    <div class="score-team">
                        <div class="score-logo" id="detail-teamA-logo"></div>
                        <h1 id="detail-teamA-name">Team A</h1>
                    </div>
                    <div class="score-center">
                        <div class="big-score">
                            <span id="score-A">3</span> - <span id="score-B">1</span>
                        </div>
                    </div>
                    <div class="score-team">
                        <div class="score-logo" id="detail-teamB-logo"></div>
                        <h1 id="detail-teamB-name">Team B</h1>
                    </div>
                </div>
            </div>
        </section>

        <!-- Stats Mockup -->
        <section class="container stats-container" style="padding-top: 2rem;">
            <!-- Team Comparison Removed per user request -->
            <!-- <div class="stats-card">...</div> -->

            <div class="match-stats-layout">
                <div class="stats-main-column">
                    <!-- Stats Filters (Relocated above Stats Card) -->
                    <div id="stats-filter-container"
                        style="display:flex; gap:0.5rem; justify-content:flex-start; margin-bottom:2rem; padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                    </div>

                    <!-- Player Stats -->
                    <div class="stats-card">
                        <h2 class="card-title">Player Statistics</h2>
                        <div class="player-table-responsive">
                            <table class="player-stats-table" id="player-stats-table">
                                <thead>
                                    <tr>
                                        <th>Player</th>
                                        <th>Kills</th>
                                        <th>Deaths</th>
                                        <th>Assists</th>
                                        <th>Rating</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Injected JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="stats-side-column" id="mvp-container">
                    <!-- MVP Card Injected via JS -->
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <h2>PEC</h2>
                <p>&copy; 2026 Power Esports Conference</p>
            </div>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
